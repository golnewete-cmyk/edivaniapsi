<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Executivo | Edivânia Psi</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #7B61FF;
            --secondary: #00F5FF;
            --success: #00FF7F;
            --bg: #050505;
            --card-bg: rgba(20, 20, 25, 0.7);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(123, 97, 255, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(0, 245, 255, 0.1) 0%, transparent 40%);
        }

        /* Partículas de fundo (Simulação) */
        .stars {
            position: absolute;
            width: 100%;
            height: 100%;
            background: url('https://www.transparenttextures.com/patterns/stardust.png');
            opacity: 0.3;
            z-index: 1;
        }

        .container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 440px;
            padding: 20px;
            perspective: 1000px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            animation: slideDown 1s cubic-bezier(0.23, 1, 0.32, 1);
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        header h1 {
            font-size: 2.8rem;
            font-weight: 800;
            letter-spacing: -1.5px;
            background: linear-gradient(to right, #fff 20%, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        header p {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 4px;
        }

        .grid {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .card {
            position: relative;
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 22px;
            border-radius: 24px;
            text-decoration: none;
            display: flex;
            align-items: center;
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            backdrop-filter: blur(15px);
            overflow: hidden;
            animation: fadeIn 0.8s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        /* Efeito de brilho ao passar o mouse */
        .card::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(120deg, transparent, rgba(255,255,255,0.05), transparent);
            transform: translateX(-100%);
            transition: 0.6s;
        }

        .card:hover::after { transform: translateX(100%); }

        .card:hover {
            transform: translateY(-5px) scale(1.02);
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
        }

        /* Cores específicas dos ícones */
        .icon {
            width: 55px;
            height: 55px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            margin-right: 20px;
            transition: 0.3s;
        }

        .i1 { background: rgba(123, 97, 255, 0.15); color: var(--primary); border: 1px solid var(--primary); }
        .i2 { background: rgba(0, 245, 255, 0.15); color: var(--secondary); border: 1px solid var(--secondary); }
        .i3 { background: rgba(0, 255, 127, 0.15); color: var(--success); border: 1px solid var(--success); }

        .card:hover .icon {
            transform: rotate(-10deg) scale(1.1);
            box-shadow: 0 0 20px currentColor;
        }

        .content h2 {
            font-size: 1.05rem;
            color: #fff;
            margin-bottom: 4px;
            font-weight: 600;
        }

        .content p {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.4);
        }

        /* Delay das animações */
        .card:nth-child(1) { animation-delay: 0.2s; }
        .card:nth-child(2) { animation-delay: 0.4s; }
        .card:nth-child(3) { animation-delay: 0.6s; }

        footer {
            margin-top: 50px;
            text-align: center;
            font-size: 0.7rem;
            color: rgba(255,255,255,0.2);
            letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <div class="stars"></div>

    <div class="container">
        <header>
            <h1>Gestão Interna</h1>
            <p>Exclusive Access</p>
        </header>

        <div class="grid">
            <a href="https://golnewete-cmyk.github.io/edivaniapsi/sessoes.html" class="card">
                <div class="icon i1">🗓️</div>
                <div class="content">
                    <h2>Agendar Acompanhamento</h2>
                    <p>Calendário de sessões dinâmico</p>
                </div>
            </a>

            <a href="https://edivaniapsi-bcvrtzrv86fmuwudz6fdn7.streamlit.app/" class="card">
                <div class="icon i2">📊</div>
                <div class="content">
                    <h2>Relatório Pós-Sessão</h2>
                    <p>Gerador de prontuários IA</p>
                </div>
            </a>

            <a href="https://docs.google.com/spreadsheets/d/1AgdUq_wS6Y25A9YgZEz7dN3dBzbiSMKRWWp4uAbRVFs/edit?usp=sharing" class="card">
                <div class="icon i3">💎</div>
                <div class="content">
                    <h2>Controle Financeiro</h2>
                    <p>Gestão de faturamento e lucro</p>
                </div>
            </a>
        </div>

        <footer>
            SISTEMA DESENVOLVIDO POR DAVI | 2026
        </footer>
    </div>
</body>
</html>
